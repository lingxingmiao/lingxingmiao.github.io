<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TranslationMinecraft - 文件翻译</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #333;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 32px;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      text-align: center;
      margin-bottom: 24px;
      color: #667eea;
      font-size: 1.8rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
    }
    input[type="text"],
    input[type="password"],
    input[type="file"],
    select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    input:focus, select:focus {
      border-color: #667eea;
      outline: none;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-group input {
      width: auto;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .status.loading {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .api-info {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #666;
      word-break: break-all;
    }
    .api-info code {
      background: #e9ecef;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 TranslationMinecraft</h1>
    
    <div class="api-info">
      <strong>API 地址</strong>:<br>
      <code>http://[2409:8a34:232:1750:3509:753:740c:da9d]:25561</code><br>
      <span style="color:#dc3545">⚠️ 注意：GitHub Pages (HTTPS) 访问 HTTP 后端可能被浏览器拦截</span>
    </div>

    <form id="translateForm">
      <!-- API Key -->
      <div class="form-group">
        <label for="apiKey">🔑 API Key (Bearer Token)</label>
        <input type="password" id="apiKey" required placeholder="请输入你的 API 密钥" />
        <div class="hint">用于身份验证，从 api-config.cfg 的 keys 数组中获取</div>
      </div>

      <!-- 主文件 -->
      <div class="form-group">
        <label for="file0">📁 主文件 (必需)</label>
        <input type="file" id="file0" required />
        <input type="text" id="fileName0" placeholder="文件名（可选，留空则用原文件名）" style="margin-top:8px;" />
      </div>

      <!-- 可选文件1 -->
      <div class="form-group">
        <label for="file1">📁 参考文件 (可选)</label>
        <input type="file" id="file1" />
        <input type="text" id="fileName1" placeholder="文件名（可选）" style="margin-top:8px;" />
      </div>

      <!-- 模式选项 -->
      <div class="form-group">
        <label>⚙️ 翻译模式</label>
        <div class="checkbox-group">
          <input type="checkbox" id="allMode" />
          <label for="allMode" style="margin:0;font-weight:normal;">启用 all_mode（全量翻译）</label>
        </div>
        <div class="hint">export_inspection 已锁定为 false</div>
      </div>

      <button type="submit" id="submitBtn">🚀 开始翻译</button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script>
    // 🔧 配置区域（按需修改）
    const API_BASE = 'http://[2409:8a34:232:1750:3509:753:740c:da9d]:25561';
    const API_ENDPOINT = '/translate';
    const EXPORT_INSPECTION = false; // 🔒 锁定参数

    const form = document.getElementById('translateForm');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    function showStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function resetStatus() {
      statusEl.className = 'status';
      statusEl.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resetStatus();

      const apiKey = document.getElementById('apiKey').value.trim();
      const file0 = document.getElementById('file0').files[0];
      const fileName0 = document.getElementById('fileName0').value.trim() || file0?.name;
      const file1 = document.getElementById('file1').files[0];
      const fileName1 = document.getElementById('fileName1').value.trim() || file1?.name;
      const allMode = document.getElementById('allMode').checked;

      if (!apiKey) {
        showStatus('❌ 请输入 API Key', 'error');
        return;
      }
      if (!file0) {
        showStatus('❌ 请上传主文件', 'error');
        return;
      }

      // 构建 FormData
      const formData = new FormData();
      formData.append('file0', file0);
      formData.append('file_name0', fileName0);
      formData.append('export_inspection', EXPORT_INSPECTION.toString());
      formData.append('all_mode', allMode.toString());
      
      if (file1) {
        formData.append('file1', file1);
        formData.append('file_name1', fileName1 || file1.name);
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ 翻译中...';
      showStatus('📤 正在上传并翻译，请稍候...', 'loading');

      try {
        const response = await fetch(`${API_BASE}${API_ENDPOINT}`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`
            // ⚠️ 不要手动设置 Content-Type，浏览器会自动为 FormData 添加 boundary
          },
          body: formData,
          // 🛡️ 如果后端未配置 CORS，可能需要 credentials: 'include'
          // credentials: 'include'
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.detail || `HTTP ${response.status}`);
        }

        // 📥 处理文件下载
        const blob = await response.blob();
        const contentDisposition = response.headers.get('content-disposition');
        let filename = 'translated_file';
        
        // 尝试从 Content-Disposition 解析文件名
        if (contentDisposition && contentDisposition.includes('filename=')) {
          const match = contentDisposition.match(/filename\*=UTF-8''(.+)|filename="?(.+)"?/);
          filename = match?.[1] || match?.[2] || filename;
        } else {
          // 备用：使用时间戳生成文件名
          filename = `translated_${Date.now()}.zip`;
        }

        // 触发下载
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = decodeURIComponent(filename);
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showStatus(`✅ 翻译完成！文件已下载：${filename}`, 'success');

      } catch (error) {
        console.error('Translation error:', error);
        
        // 🌐 CORS 错误提示
        if (error.message.includes('Failed to fetch') || error.name === 'TypeError') {
          showStatus(
            '🔒 请求被浏览器拦截！可能原因：\n' +
            '1️⃣ 后端未配置 CORS（需在 FastAPI 添加 CORSMiddleware）\n' +
            '2️⃣ HTTPS 页面访问 HTTP 接口（混合内容）\n' +
            '✅ 解决方案：后端启用 HTTPS 或使用反向代理',
            'error'
          );
        } else {
          showStatus(`❌ 翻译失败：${error.message}`, 'error');
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '🚀 开始翻译';
      }
    });
  </script>
</body>
</html>
