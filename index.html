<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TranslationMinecraft - 文件翻译</title>
  <style>
    /* ... (保持原有的 CSS 样式不变) ... */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #333;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 32px;
      max-width: 600px;
      width: 100%;
    }
    h1 { text-align: center; margin-bottom: 24px; color: #667eea; font-size: 1.8rem; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
    input[type="text"], input[type="password"], input[type="file"], select {
      width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: border-color 0.3s;
    }
    input:focus, select:focus { border-color: #667eea; outline: none; }
    .checkbox-group { display: flex; align-items: center; gap: 8px; }
    .checkbox-group input { width: auto; }
    button {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
    button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .status { margin-top: 20px; padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; display: none; }
    .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
    .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
    .status.loading { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; display: block; }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    
    /* 🔥 新增：API 地址区域样式 */
    .api-box {
      background: #f8f9fa;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #e9ecef;
      margin-bottom: 20px;
    }
    .api-presets {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .preset-btn {
      width: auto;
      padding: 6px 12px;
      font-size: 12px;
      background: #e9ecef;
      color: #495057;
      margin: 0;
      transform: none;
      box-shadow: none;
    }
    .preset-btn:hover {
      background: #dee2e6;
      transform: none;
      box-shadow: none;
    }
    .protocol-warning {
      color: #dc3545;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 TranslationMinecraft</h1>
    
    <!-- 🔥 新增：API 地址输入区域 -->
    <div class="api-box">
      <label for="apiBase">🌐 API 服务器地址</label>
      <input type="text" id="apiBase" placeholder="例如: http://[::1]:25561 或 https://xxx.workers.dev" />
      <div class="api-presets">
        <button type="button" class="preset-btn" onclick="setApi('http://[::1]:25561')">🏠 本地 IPv6</button>
        <button type="button" class="preset-btn" onclick="setApi('http://127.0.0.1:25561')">💻 本地 IPv4</button>
        <button type="button" class="preset-btn" onclick="setApi('https://')">🔒 HTTPS (填空缺省)</button>
      </div>
      <div id="protocolWarning" class="protocol-warning">
        ⚠️ 当前网页是 HTTPS，必须输入 https:// 开头的地址，否则会被浏览器拦截！
      </div>
      <div class="hint">💡 地址会自动保存，下次打开无需重填</div>
    </div>

    <form id="translateForm">
      <!-- API Key -->
      <div class="form-group">
        <label for="apiKey">🔑 API Key (Bearer Token)</label>
        <input type="password" id="apiKey" required placeholder="请输入你的 API 密钥" />
        <div class="hint">用于身份验证，从 api-config.cfg 的 keys 数组中获取</div>
      </div>

      <!-- 主文件 -->
      <div class="form-group">
        <label for="file0">📁 主文件 (必需)</label>
        <input type="file" id="file0" required />
        <input type="text" id="fileName0" placeholder="文件名（可选，留空则用原文件名）" style="margin-top:8px;" />
      </div>

      <!-- 可选文件1 -->
      <div class="form-group">
        <label for="file1">📁 参考文件 (可选)</label>
        <input type="file" id="file1" />
        <input type="text" id="fileName1" placeholder="文件名（可选）" style="margin-top:8px;" />
      </div>

      <!-- 模式选项 -->
      <div class="form-group">
        <label>⚙️ 翻译模式</label>
        <div class="checkbox-group">
          <input type="checkbox" id="allMode" />
          <label for="allMode" style="margin:0;font-weight:normal;">启用 all_mode（全量翻译）</label>
        </div>
        <div class="hint">export_inspection 已锁定为 false</div>
      </div>

      <button type="submit" id="submitBtn">🚀 开始翻译</button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script>
    // 🔧 配置区域
    const API_ENDPOINT = '/translate';
    const EXPORT_INSPECTION = false; // 🔒 锁定参数

    // 🔥 获取 DOM 元素
    const apiBaseInput = document.getElementById('apiBase');
    const protocolWarning = document.getElementById('protocolWarning');
    const form = document.getElementById('translateForm');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    // 🔥 1. 初始化：从 localStorage 读取上次保存的地址
    window.addEventListener('DOMContentLoaded', () => {
      const savedApi = localStorage.getItem('tm_api_base');
      if (savedApi) {
        apiBaseInput.value = savedApi;
      } else {
        // 默认提示
        if (window.location.protocol === 'https:') {
          apiBaseInput.placeholder = "⚠️ GitHub Pages 用户请填入 https:// 开头的代理地址";
        } else {
          apiBaseInput.placeholder = "http://[::1]:25561";
        }
      }
      checkProtocol();
    });

    // 🔥 2. 监听输入变化，自动保存
    apiBaseInput.addEventListener('input', (e) => {
      localStorage.setItem('tm_api_base', e.target.value);
      checkProtocol();
    });

    // 🔥 3. 检查 HTTPS 混合内容风险
    function checkProtocol() {
      const val = apiBaseInput.value.trim();
      if (window.location.protocol === 'https:' && val && !val.startsWith('https://')) {
        protocolWarning.style.display = 'block';
      } else {
        protocolWarning.style.display = 'none';
      }
    }

    // 🔥 快捷填充函数
    function setApi(url) {
      apiBaseInput.value = url;
      apiBaseInput.focus();
      checkProtocol();
    }

    function showStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function resetStatus() {
      statusEl.className = 'status';
      statusEl.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resetStatus();

      const apiBase = apiBaseInput.value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const file0 = document.getElementById('file0').files[0];
      const fileName0 = document.getElementById('fileName0').value.trim() || file0?.name;
      const file1 = document.getElementById('file1').files[0];
      const fileName1 = document.getElementById('fileName1').value.trim() || file1?.name;
      const allMode = document.getElementById('allMode').checked;

      // 🔥 验证地址
      if (!apiBase) {
        showStatus('❌ 请输入 API 服务器地址', 'error');
        apiBaseInput.focus();
        return;
      }
      if (!apiBase.startsWith('http://') && !apiBase.startsWith('https://')) {
        showStatus('❌ 地址必须以 http:// 或 https:// 开头', 'error');
        return;
      }
      if (!apiKey) {
        showStatus('❌ 请输入 API Key', 'error');
        return;
      }
      if (!file0) {
        showStatus('❌ 请上传主文件', 'error');
        return;
      }

      // 构建 FormData
      const formData = new FormData();
      formData.append('file0', file0);
      formData.append('file_name0', fileName0);
      formData.append('export_inspection', EXPORT_INSPECTION.toString());
      formData.append('all_mode', allMode.toString());
      
      if (file1) {
        formData.append('file1', file1);
        formData.append('file_name1', fileName1 || file1.name);
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ 翻译中...';
      showStatus('📤 正在上传并翻译，请稍候...', 'loading');

      try {
        // 🔥 使用用户输入的地址
        const fullUrl = apiBase.replace(/\/$/, '') + API_ENDPOINT; // 去掉末尾斜杠防止拼错
        
        const response = await fetch(fullUrl, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`
          },
          body: formData,
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.detail || `HTTP ${response.status}`);
        }

        // 📥 处理文件下载
        const blob = await response.blob();
        const contentDisposition = response.headers.get('content-disposition');
        let filename = 'translated_file';
        
        if (contentDisposition && contentDisposition.includes('filename=')) {
          const match = contentDisposition.match(/filename\*=UTF-8''(.+)|filename="?(.+)"?/);
          filename = match?.[1] || match?.[2] || filename;
        } else {
          filename = `translated_${Date.now()}.zip`;
        }

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = decodeURIComponent(filename);
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        showStatus(`✅ 翻译完成！文件已下载：${filename}`, 'success');

      } catch (error) {
        console.error('Translation error:', error);
        
        if (error.message.includes('Failed to fetch')) {
          if (!apiBase.startsWith('https://') && window.location.protocol === 'https:') {
             showStatus('🔒 请求被拦截！HTTPS 网页不能访问 HTTP 接口。\n请填入 https:// 开头的代理地址。', 'error');
          } else {
             showStatus('🔒 连接失败！请检查：\n1. 地址是否正确\n2. 后端是否开启 CORS\n3. 防火墙/端口是否开放', 'error');
          }
        } else {
          showStatus(`❌ 翻译失败：${error.message}`, 'error');
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '🚀 开始翻译';
      }
    });
  </script>
</body>
</html>
